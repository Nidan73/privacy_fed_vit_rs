  A3_fedavg_ckks_iid_vit_base:
    experiment_id: A3_fedavg_ckks_iid_vit_base
    experiment_name: "A3: FedAvg + ViT-Base + CKKS, IID clients"
    model_name: vit_base_patch16_224
    fl_method: fedavg
    privacy: selected_layer_ckks
    global_rounds: 5
    local_epochs: 1
